<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Bible Reading</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="content">
            <!-- Date Navigation Section -->
            <div class="date-section">
                <div class="date-display" id="dateDisplay">Loading...</div>
                <div class="button-row">
                    <button class="nav-btn prev-btn" id="prevBtn">←</button>
                    <button class="nav-btn today-btn" id="todayBtn">Reading Today</button>
                    <button class="nav-btn next-btn" id="nextBtn">→</button>
                </div>
            </div>

            <!-- Old Testament Section -->
            <div class="reading-section ot-section">
                <h2>Old Testament</h2>
                <p class="reading-text" id="otReading">Loading...</p>
            </div>

            <!-- New Testament Section -->
            <div class="reading-section nt-section">
                <h2>New Testament</h2>
                <p class="reading-text" id="ntReading">Loading...</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
